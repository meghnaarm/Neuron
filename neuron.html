<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURON | The 2026 AI Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020205; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-anim { transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .card-anim:hover { transform: translateY(-10px); border-color: rgba(96, 165, 250, 0.5); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); }
        [x-cloak] { display: none !important; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; animation: marquee 30s linear infinite; }
    </style>
</head>
<body x-data="neuronMaster()" x-init="init()">

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-3xl">
        <div class="glass p-12 rounded-[50px] w-full max-w-md text-center border-white/10 shadow-2xl">
            <div class="text-5xl font-black tracking-tighter text-gradient mb-4">NEURON</div>
            <p class="text-gray-500 mb-10 text-sm uppercase tracking-widest">Biometric Identity Required</p>
            <input type="text" x-model="user" placeholder="Enter Username" @keyup.enter="login()"
                   class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 mb-6 focus:outline-none focus:border-blue-500 text-center text-xl transition-all">
            <button @click="login()" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-blue-500 hover:text-white transition-all uppercase tracking-widest text-sm">
                Access Interface
            </button>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak class="min-h-screen flex flex-col">
        
        <nav class="max-w-7xl mx-auto p-8 w-full flex justify-between items-center">
            <div class="flex items-center gap-3 group cursor-pointer" @click="activeCat = 'All'; query = ''">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20 group-hover:rotate-12 transition-transform">
                    <span class="text-white font-black text-xl">N</span>
                </div>
                <div class="text-3xl font-black tracking-tighter text-gradient">NEURON</div>
            </div>
            <div class="flex items-center gap-6 glass px-6 py-3 rounded-2xl border-white/5">
                <div class="text-right">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Node Active</p>
                    <p class="text-sm font-bold" x-text="user"></p>
                </div>
                <button @click="logout()" class="p-2 text-gray-500 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7" /></svg>
                </button>
            </div>
        </nav>

        <header class="max-w-4xl mx-auto text-center py-16 px-6">
            <h1 class="text-6xl md:text-8xl font-black mb-12 tracking-tight leading-[1.1]">The AI <span class="text-gradient">Pulse.</span></h1>
            
            <div class="relative max-w-2xl mx-auto mb-12">
                <input type="text" x-model="query" @input="showSuggestions = true" placeholder="Search neural toolsets..." 
                       class="w-full bg-white/5 border border-white/10 rounded-3xl px-10 py-6 focus:outline-none focus:border-blue-500/50 text-xl shadow-2xl transition-all">
                
                <div x-show="showSuggestions && query.length > 1" @click.away="showSuggestions = false" 
                     class="absolute top-full left-0 w-full mt-3 glass rounded-3xl overflow-hidden z-50 text-left shadow-2xl">
                    <template x-for="s in suggestions()">
                        <div @click="query = s.name; showSuggestions = false" 
                             class="px-10 py-5 hover:bg-white/5 cursor-pointer flex justify-between items-center border-b border-white/5 last:border-0">
                            <span class="font-bold text-lg" x-text="s.name"></span>
                            <span class="text-[10px] uppercase font-black text-blue-400" x-text="s.cat"></span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-3">
                <button @click="activeCat = 'All'" class="px-8 py-3 rounded-full text-xs font-black uppercase tracking-widest transition-all" :class="activeCat === 'All' ? 'bg-white text-black' : 'bg-white/5 text-gray-500'">All Tools</button>
                <button @click="activeCat = 'Favorites'" class="px-8 py-3 rounded-full text-xs font-black uppercase tracking-widest transition-all" :class="activeCat === 'Favorites' ? 'bg-yellow-400 text-black' : 'bg-white/5 text-gray-500'">My Stack</button>
                <button @click="launchRandom()" class="px-8 py-3 rounded-full text-xs font-black uppercase tracking-widest bg-blue-600/20 text-blue-400 border border-blue-500/20 hover:bg-blue-600 hover:text-white transition-all">Surprise Me</button>
            </div>
        </header>

        <section class="max-w-7xl mx-auto px-10 mb-20 w-full">
            <p class="text-[10px] font-black tracking-[0.4em] text-gray-600 uppercase mb-6">Autonomous Workflows</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div @click="workflow(['https://chat.openai.com', 'https://gamma.app'])" class="glass p-8 rounded-[40px] cursor-pointer group hover:bg-white/5 transition-all flex justify-between items-center">
                    <div>
                        <h4 class="text-xl font-bold mb-1">Content Strategy Stack</h4>
                        <p class="text-sm text-gray-500">Opens ChatGPT + Gamma Presentation</p>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center group-hover:bg-blue-500 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    </div>
                </div>
                <div @click="workflow(['https://claude.ai', 'https://v0.dev', 'https://hostinger.com'])" class="glass p-8 rounded-[40px] cursor-pointer group hover:bg-white/5 transition-all flex justify-between items-center">
                    <div>
                        <h4 class="text-xl font-bold mb-1">Full-Stack Dev Launch</h4>
                        <p class="text-sm text-gray-500">Opens Claude + v0 + Hostinger AI</p>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center group-hover:bg-purple-500 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
                    </div>
                </div>
            </div>
        </section>

        <main class="max-w-7xl mx-auto px-10 pb-40 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 w-full">
            <template x-for="tool in filteredTools()">
                <div class="glass card-anim rounded-[50px] p-10 flex flex-col justify-between relative">
                    <button @click="toggleFav(tool.name)" class="absolute top-10 right-10 p-2 transition-transform active:scale-150"
                            :class="favs.includes(tool.name) ? 'text-yellow-400' : 'text-gray-800 hover:text-white'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" :fill="favs.includes(tool.name) ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                    </button>
                    <div>
                        <span class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500 mb-6 block" x-text="tool.cat"></span>
                        <h2 class="text-4xl font-extrabold mb-4 tracking-tight" x-text="tool.name"></h2>
                        <p class="text-gray-500 text-sm leading-relaxed mb-12" x-text="tool.desc"></p>
                    </div>
                    <div class="flex items-center justify-between border-t border-white/5 pt-8">
                        <div>
                            <p class="text-[10px] uppercase text-gray-600 font-bold mb-1">Access</p>
                            <p class="text-2xl font-black" x-text="tool.price"></p>
                        </div>
                        <a :href="tool.link" target="_blank" class="px-8 py-4 bg-white text-black rounded-2xl font-black hover:bg-blue-500 hover:text-white transition-all shadow-xl">Launch</a>
                    </div>
                </div>
            </template>
        </main>

        <footer class="mt-auto glass border-t border-white/5 py-4 overflow-hidden">
            <div class="animate-marquee whitespace-nowrap">
                <template x-for="i in 10">
                    <span class="mx-10 text-[10px] uppercase tracking-[0.5em] text-gray-600 font-bold">
                        Neuron Nexus Core Online // Neural Engine Active // 2026 AI Standard // Secure Connection Established //
                    </span>
                </template>
            </div>
        </footer>
    </div>

    <script>
        function neuronMaster() {
            return {
                isLoggedIn: false, user: '', query: '', activeCat: 'All', favs: [], showSuggestions: false,
                tools: [
                    { name: 'ChatGPT', cat: 'Assistant', desc: 'The industry-leading LLM for reasoning and versatile chat.', link: 'https://chat.openai.com', price: '$20/mo' },
                    { name: 'Gemini', cat: 'Assistant', desc: 'Google multimodal AI with massive 2M token context window.', link: 'https://gemini.google.com', price: '$19.99/mo' },
                    { name: 'Claude', cat: 'Assistant', desc: 'Premier AI for high-accuracy coding and document analysis.', link: 'https://claude.ai', price: '$20/mo' },
                    { name: 'Gamma', cat: 'Design', desc: 'Generate full presentations and webpages from a single prompt.', link: 'https://gamma.app', price: '$16/mo' },
                    { name: 'Chronicle', cat: 'Design', desc: 'Futuristic block-based storytelling and presentation platform.', link: 'https://chroniclehq.com', price: '$20/mo' },
                    { name: 'Superhuman', cat: 'Productivity', desc: 'AI-driven email client for maximum throughput and speed.', link: 'https://superhuman.com', price: '$30/mo' },
                    { name: 'V0.dev', cat: 'Development', desc: 'Vercel generative UI system for building modern components.', link: 'https://v0.dev', price: '$20/mo' },
                    { name: 'Hostinger AI', cat: 'Development', desc: 'Instant AI website builder and managed hosting environment.', link: 'https://hostinger.com', price: '$2.99/mo' },
                    { name: 'Perplexity', cat: 'Assistant', desc: 'Real-time conversational search engine with linked sources.', link: 'https://perplexity.ai', price: '$20/mo' }
                ],
                init() {
                    const savedUser = localStorage.getItem('neu_user');
                    const savedFavs = localStorage.getItem('neu_favs');
                    if (savedUser) { this.user = savedUser; this.isLoggedIn = true; }
                    if (savedFavs) this.favs = JSON.parse(savedFavs);
                },
                login() { if (this.user.trim()) { localStorage.setItem('neu_user', this.user); this.isLoggedIn = true; } },
                logout() { localStorage.removeItem('neu_user'); location.reload(); },
                toggleFav(name) {
                    this.favs = this.favs.includes(name) ? this.favs.filter(f => f !== name) : [...this.favs, name];
                    localStorage.setItem('neu_favs', JSON.stringify(this.favs));
                },
                suggestions() { return this.tools.filter(t => t.name.toLowerCase().includes(this.query.toLowerCase())).slice(0, 3); },
                filteredTools() {
                    return this.tools.filter(t => {
                        const mSearch = t.name.toLowerCase().includes(this.query.toLowerCase()) || t.desc.toLowerCase().includes(this.query.toLowerCase());
                        const mCat = this.activeCat === 'All' || (this.activeCat === 'Favorites' && this.favs.includes(t.name)) || t.cat === this.activeCat;
                        return mSearch && mCat;
                    });
                },
                workflow(links) { links.forEach(link => window.open(link, '_blank')); },
                launchRandom() {
                    const randomTool = this.tools[Math.floor(Math.random() * this.tools.length)];
                    this.query = randomTool.name;
                    this.activeCat = 'All';
                }
            }
        }
    </script>
</body>
</html>
