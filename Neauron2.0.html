<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURON ULTRA | The 2026 Universal AI Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020205; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container:focus-within { border-color: #60a5fa; box-shadow: 0 0 40px rgba(96, 165, 250, 0.15); }
        .tool-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tool-card:hover { transform: translateY(-10px) scale(1.02); border-color: rgba(192, 132, 252, 0.4); }
        [x-cloak] { display: none !important; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { position: absolute; height: 2px; width: 100%; background: #60a5fa; box-shadow: 0 0 15px #60a5fa; animation: scan 2s linear infinite; }
    </style>
</head>
<body x-data="neuronUltra()" x-init="init()">

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-3xl">
        <div class="glass p-12 rounded-[60px] w-full max-w-md text-center border-white/10 shadow-2xl">
            <div class="text-5xl font-black tracking-tighter text-gradient mb-8">NEURON</div>
            <input type="text" x-model="user" placeholder="Enter Access Name" @keyup.enter="login()"
                   class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 mb-6 focus:outline-none focus:border-blue-500 text-center text-xl">
            <button @click="login()" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-blue-500 hover:text-white transition-all uppercase tracking-widest text-xs">Initialize Node</button>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak class="min-h-screen">
        
        <nav class="max-w-7xl mx-auto p-10 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="text-white font-black text-2xl">N</span>
                </div>
                <div class="text-4xl font-black tracking-tighter">NEURON<span class="text-blue-500">.</span>ULTRA</div>
            </div>
            <div class="flex items-center gap-4">
                <button @click="scrollToSubmit()" class="text-xs uppercase font-black tracking-widest text-gray-500 hover:text-white transition-all underline decoration-blue-500/50">Submit Tool</button>
                <div class="h-10 w-[1px] bg-white/10 hidden md:block"></div>
                <span class="text-sm font-bold opacity-60">Session: <span class="text-white" x-text="user"></span></span>
            </div>
        </nav>

        <header class="max-w-4xl mx-auto text-center py-10 px-6">
            <h2 class="text-6xl md:text-8xl font-black mb-10 tracking-tight leading-none">The Directory of <span class="text-gradient">Everything.</span></h2>
            
            <div class="relative max-w-3xl mx-auto search-container border border-white/10 rounded-[32px] overflow-hidden transition-all">
                <input type="text" x-model="query" placeholder="Type a tool name or what you want to do (e.g. 'generate video')..." 
                       class="w-full bg-white/5 px-10 py-7 focus:outline-none text-xl placeholder:text-gray-700">
                <div class="absolute right-8 top-1/2 -translate-y-1/2 text-gray-600">
                    <span class="text-xs font-bold bg-white/5 px-3 py-1 rounded-lg" x-text="filteredTools().length + ' results'"></span>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-3 mt-10">
                <template x-for="cat in categories">
                    <button @click="activeCat = cat" 
                            :class="activeCat === cat ? 'bg-white text-black scale-110' : 'bg-white/5 text-gray-500 hover:text-white'"
                            class="px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" x-text="cat"></button>
                </template>
                <button @click="launchScanner()" class="px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest bg-blue-600/20 text-blue-400 border border-blue-500/20 hover:bg-blue-500 hover:text-white transition-all">Surprise Me</button>
            </div>
        </header>

        <div x-show="isScanning" x-cloak class="fixed inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-md">
            <div class="w-64 h-96 glass rounded-3xl relative overflow-hidden flex items-center justify-center">
                <div class="scanner-line"></div>
                <div class="text-center">
                    <div class="text-gradient font-black text-2xl animate-pulse">SCANNING</div>
                    <div class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">Finding Best Match...</div>
                </div>
            </div>
        </div>

        <main class="max-w-[1400px] mx-auto px-10 pb-20 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <template x-for="tool in filteredTools()">
                <div class="glass tool-card rounded-[40px] p-8 flex flex-col justify-between relative">
                    <button @click="toggleFav(tool.name)" class="absolute top-8 right-8 transition-colors"
                            :class="favs.includes(tool.name) ? 'text-yellow-400' : 'text-gray-800 hover:text-white'">
                        <svg class="h-7 w-7" :fill="favs.includes(tool.name) ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                    </button>
                    <div>
                        <div class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500 mb-6" x-text="tool.cat"></div>
                        <h2 class="text-3xl font-extrabold mb-4 tracking-tight leading-tight" x-text="tool.name"></h2>
                        <p class="text-gray-500 text-sm leading-relaxed mb-10" x-text="tool.desc"></p>
                    </div>
                    <div class="pt-8 border-t border-white/5 flex items-center justify-between">
                        <div>
                            <p class="text-[10px] uppercase text-gray-700 font-bold mb-1">Pricing</p>
                            <p class="text-xl font-black" x-text="tool.price"></p>
                        </div>
                        <a :href="tool.link" target="_blank" class="px-6 py-3 bg-white text-black rounded-2xl font-black hover:bg-blue-500 hover:text-white transition-all shadow-xl">Visit</a>
                    </div>
                </div>
            </template>
        </main>

        <section id="submit-section" class="max-w-4xl mx-auto px-10 pb-40">
            <div class="glass p-12 rounded-[50px] border-blue-500/20">
                <h3 class="text-4xl font-black mb-4">Expand the Registry.</h3>
                <p class="text-gray-500 mb-10">Found a new AI tool? Add it to your local database.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" x-model="newTool.name" placeholder="Tool Name" class="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500">
                    <input type="text" x-model="newTool.cat" placeholder="Category (e.g. Image)" class="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500">
                    <input type="text" x-model="newTool.link" placeholder="URL (https://...)" class="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500">
                    <input type="text" x-model="newTool.price" placeholder="Price (e.g. Free)" class="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500">
                    <textarea x-model="newTool.desc" placeholder="What does it do?" class="md:col-span-2 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500 h-32"></textarea>
                    <button @click="addTool()" class="md:col-span-2 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest">Update Registry</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        function neuronUltra() {
            return {
                isLoggedIn: false, user: '', query: '', activeCat: 'All', favs: [], isScanning: false,
                categories: ['All', 'Favorites', 'Assistant', 'Image', 'Video', 'Coding', 'Research', 'Productivity'],
                newTool: { name: '', cat: '', desc: '', link: '', price: '' },
                tools: [
                    // ASSISTANTS
                    { name: 'GPT-5.3', cat: 'Assistant', desc: 'The 2026 state-of-the-art general purpose reasoning model by OpenAI.', link: 'https://chat.openai.com', price: '$20/mo' },
                    { name: 'Claude 4.6 Opus', cat: 'Assistant', desc: 'Anthropic\'s deepest reasoning model for complex logic and massive documents.', link: 'https://claude.ai', price: '$20/mo' },
                    { name: 'Gemini 3.1 Pro', cat: 'Assistant', desc: 'Google\'s ultra-fast multimodal AI with advanced computer control.', link: 'https://gemini.google.com', price: '$19.99/mo' },
                    { name: 'Perplexity Pro', cat: 'Research', desc: 'Conversational answer engine with deep real-time web research citations.', link: 'https://perplexity.ai', price: '$20/mo' },
                    
                    // VIDEO
                    { name: 'Sora 2', cat: 'Video', desc: 'Cinematic AI video generation with consistent storytelling and long clips.', link: 'https://openai.com/sora', price: 'Plus Sub' },
                    { name: 'Veo 3', cat: 'Video', desc: 'Google High-fidelity video generation with native audio and 4K support.', link: 'https://labs.google', price: 'Freemium' },
                    { name: 'Runway Gen-4', cat: 'Video', desc: 'The professional standard for generative VFX and AI filmmaking.', link: 'https://runwayml.com', price: '$15/mo' },
                    { name: 'HeyGen 2026', cat: 'Video', desc: 'Interactive AI avatars with real-time lip-sync and multilingual support.', link: 'https://heygen.com', price: 'Paid' },

                    // CODING & DEV
                    { name: 'Cursor', cat: 'Coding', desc: 'The most popular AI-first code editor for rapid software development.', link: 'https://cursor.com', price: 'Freemium' },
                    { name: 'Lovable', cat: 'Coding', desc: 'Turn natural language into full-stack web applications instantly.', link: 'https://lovable.dev', price: 'Paid' },
                    { name: 'V0.dev', cat: 'Coding', desc: 'Generative UI system for creating React and Tailwind components.', link: 'https://v0.dev', price: 'Freemium' },
                    { name: 'Bolt.new', cat: 'Coding', desc: 'Full-stack browser-based AI IDE for building and deploying apps.', link: 'https://bolt.new', price: 'Free' },

                    // IMAGE
                    { name: 'Midjourney V8', cat: 'Image', desc: 'The world\'s highest quality artistic image generator with total control.', link: 'https://midjourney.com', price: '$10/mo' },
                    { name: 'Ideogram 2', cat: 'Image', desc: 'Best-in-class typography and graphic design image generation.', link: 'https://ideogram.ai', price: 'Freemium' },
                    { name: 'Adobe Firefly 4', cat: 'Image', desc: 'Commercially safe generative AI integrated into Creative Cloud.', link: 'https://firefly.adobe.com', price: 'Paid' },

                    // PRODUCTIVITY
                    { name: 'Superhuman AI', cat: 'Productivity', desc: 'Elite email experience that uses AI to draft, summarize, and prioritize.', link: 'https://superhuman.com', price: '$30/mo' },
                    { name: 'Motion', cat: 'Productivity', desc: 'AI-assisted scheduling that automatically plans your entire workday.', link: 'https://usemotion.com', price: 'Paid' },
                    { name: 'Notion AI', cat: 'Productivity', desc: 'The ultimate workspace with built-in document generation and summaries.', link: 'https://notion.so', price: 'Freemium' },
                    { name: 'Gamma', cat: 'Productivity', desc: 'Generate amazing presentations and pitch decks from a single prompt.', link: 'https://gamma.app', price: '$16/mo' }
                ],
                init() {
                    const savedUser = localStorage.getItem('ultra_user');
                    const savedFavs = localStorage.getItem('ultra_favs');
                    const savedTools = localStorage.getItem('ultra_tools');
                    if (savedUser) { this.user = savedUser; this.isLoggedIn = true; }
                    if (savedFavs) this.favs = JSON.parse(savedFavs);
                    if (savedTools) this.tools = [...this.tools, ...JSON.parse(savedTools)];
                },
                login() { if (this.user.trim()) { localStorage.setItem('ultra_user', this.user); this.isLoggedIn = true; } },
                toggleFav(name) {
                    this.favs = this.favs.includes(name) ? this.favs.filter(f => f !== name) : [...this.favs, name];
                    localStorage.setItem('ultra_favs', JSON.stringify(this.favs));
                },
                filteredTools() {
                    return this.tools.filter(t => {
                        const lowQuery = this.query.toLowerCase();
                        const mSearch = t.name.toLowerCase().includes(lowQuery) || t.desc.toLowerCase().includes(lowQuery);
                        const mCat = this.activeCat === 'All' || (this.activeCat === 'Favorites' && this.favs.includes(t.name)) || t.cat === this.activeCat;
                        return mSearch && mCat;
                    });
                },
                launchScanner() {
                    this.isScanning = true;
                    setTimeout(() => {
                        const random = this.tools[Math.floor(Math.random() * this.tools.length)];
                        this.query = random.name;
                        this.activeCat = 'All';
                        this.isScanning = false;
                    }, 2000);
                },
                addTool() {
                    if (this.newTool.name && this.newTool.link) {
                        const added = JSON.parse(localStorage.getItem('ultra_tools') || '[]');
                        added.push({...this.newTool});
                        localStorage.setItem('ultra_tools', JSON.stringify(added));
                        this.tools.push({...this.newTool});
                        this.newTool = { name: '', cat: '', desc: '', link: '', price: '' };
                        alert('Registry Updated!');
                    }
                },
                scrollToSubmit() { document.getElementById('submit-section').scrollIntoView({ behavior: 'smooth' }); }
            }
        }
    </script>
</body>
</html>
