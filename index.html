<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURON | Vanguard AI Index</title>
    <link rel="icon" href="https://fav.farm/🧠">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020205; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .bg-custom {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(2, 2, 5, 0.97), rgba(2, 2, 5, 0.97)), 
                              url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover; background-position: center; z-index: -10;
        }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gradient { background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tool-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 32px; height: 100%; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); }
        .tool-card:hover { transform: translateY(-8px); border-color: #60a5fa; background: rgba(255, 255, 255, 0.03); }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-text { animation: marquee 35s linear infinite; display: inline-block; white-space: nowrap; }
        [x-cloak] { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="neuronSystem()" x-init="init()">
    <div class="bg-custom"></div>

    <div class="fixed top-0 w-full z-[100] glass border-b border-white/5 h-8 flex items-center overflow-hidden">
        <div class="ticker-text text-[9px] font-black uppercase tracking-[0.3em] text-blue-400">
            [LIVE] NEURON 3.0 DEPLOYED • CLAUDE 4 INTEGRATION COMPLETE • NEW RECIPE: "MARKET DISRUPTOR" ADDED • SYSTEM STATUS: OPTIMAL • 
        </div>
    </div>

    <div :class="padOpen ? 'translate-x-0' : 'translate-x-[88%]'" class="fixed right-0 top-12 bottom-5 z-50 w-96 glass rounded-l-[40px] p-8 border-blue-500/20 shadow-2xl transition-transform duration-500 flex flex-col">
        <button @click="padOpen = !padOpen" class="absolute -left-12 top-10 bg-blue-600 w-12 h-12 rounded-l-2xl flex items-center justify-center">
            <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
        </button>
        
        <div class="flex justify-between items-center mb-6">
            <h4 class="text-[10px] font-black uppercase tracking-widest text-blue-400">System Interface</h4>
            <div class="flex gap-4">
                <button @click="sidebarTab = 'draft'" :class="sidebarTab === 'draft' ? 'text-white' : 'text-gray-600'" class="text-[9px] font-black uppercase tracking-tighter">Draft</button>
                <button @click="sidebarTab = 'recipes'" :class="sidebarTab === 'recipes' ? 'text-white' : 'text-gray-600'" class="text-[9px] font-black uppercase tracking-tighter">Recipes</button>
                <button @click="sidebarTab = 'chat'" :class="sidebarTab === 'chat' ? 'text-white' : 'text-gray-600'" class="text-[9px] font-black uppercase tracking-tighter">Concierge</button>
            </div>
        </div>

        <div x-show="sidebarTab === 'draft'" class="flex flex-col h-full overflow-hidden">
            <textarea x-model="scratchpad" @input="updateRecs()" placeholder="Draft intent..." class="w-full flex-grow bg-white/5 border border-white/10 rounded-3xl p-6 text-sm focus:outline-none focus:border-blue-500 transition-all mb-4 scrollbar-hide"></textarea>
            <div x-show="recommendations.length > 0" class="mb-4 p-4 glass rounded-2xl border-blue-500/10">
                <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Matched Nodes:</p>
                <div class="flex flex-wrap gap-2">
                    <template x-for="name in recommendations">
                        <button @click="launchToolByName(name)" class="px-3 py-1 bg-blue-500/20 border border-blue-500/30 rounded-lg text-[9px] font-bold text-white hover:bg-blue-600 transition-all" x-text="name"></button>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="sidebarTab === 'recipes'" class="flex-grow overflow-y-auto space-y-4 mb-4 pr-2 scrollbar-hide">
            <template x-for="recipe in recipes">
                <div @click="applyRecipe(recipe)" class="p-5 glass rounded-3xl border-white/5 cursor-pointer hover:border-blue-500 transition-all group">
                    <h5 class="text-[10px] font-black text-white group-hover:text-blue-400 mb-1" x-text="recipe.title"></h5>
                    <p class="text-[9px] text-gray-500 leading-relaxed line-clamp-2" x-text="recipe.desc"></p>
                </div>
            </template>
        </div>

        <div x-show="sidebarTab === 'chat'" class="flex flex-col h-full overflow-hidden">
            <div class="flex-grow overflow-y-auto space-y-4 mb-4 pr-2 scrollbar-hide text-[11px]" id="chat-container">
                <div class="p-3 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-blue-400 font-bold mb-1">Neuron Concierge</p>
                    <p class="text-gray-300">Welcome. Ask me about tools or prompt strategies.</p>
                </div>
                <template x-for="msg in chatHistory">
                    <div :class="msg.role === 'user' ? 'text-right' : 'text-left'">
                        <div :class="msg.role === 'user' ? 'bg-blue-600 text-white inline-block ml-10' : 'bg-white/5 border border-white/10 text-gray-300'" class="p-3 rounded-2xl">
                            <p x-text="msg.content"></p>
                        </div>
                    </div>
                </template>
            </div>
            <div class="relative">
                <input type="text" x-model="chatInput" @keyup.enter="sendChat()" placeholder="Type a message..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3 text-xs outline-none focus:border-blue-500 pr-12">
                <button @click="sendChat()" class="absolute right-3 top-2 text-blue-500">🚀</button>
            </div>
        </div>

        <div class="mt-4 space-y-2">
            <button @click="refinePrompt()" class="w-full bg-white text-black py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Smart Refine</button>
            <div class="grid grid-cols-2 gap-2">
                <button @click="copyPrompt()" class="py-3 rounded-xl text-[10px] font-black uppercase transition-all" :class="copyStatus ? 'bg-green-500 text-white' : 'bg-white/10 text-gray-400'" x-text="copyStatus ? 'Copied!' : 'Copy'"></button>
                <button @click="scratchpad = ''; chatHistory = []" class="bg-white/5 py-3 rounded-xl text-[10px] font-black uppercase text-gray-700 hover:text-red-500 transition-all">Reset</button>
            </div>
        </div>
    </div>

    <div x-show="view === 'hub'" x-cloak class="pt-8">
        <nav class="max-w-7xl mx-auto p-12 flex justify-between items-center">
            <div class="text-3xl font-black tracking-tighter flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg">N</div> NEURON
            </div>
            <div class="flex items-center gap-6">
                <button @click="toggleCompare()" :class="compareOpen ? 'bg-blue-600 text-white' : 'glass text-gray-500'" class="px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all">Compare Mode</button>
                <button @click="view = 'profile'" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center font-bold text-xs" x-text="user[0]"></button>
            </div>
        </nav>

        <header class="max-w-4xl mx-auto text-center py-10 px-6">
            <h1 class="text-7xl md:text-9xl font-black mb-12 tracking-tighter uppercase leading-none text-gradient">Core Hub</h1>
            <div class="relative max-w-xl mx-auto mb-16">
                <input type="text" x-model="query" placeholder="Search 100+ AI Nodes..." class="w-full bg-white/5 border border-white/10 rounded-full px-10 py-7 focus:outline-none focus:border-blue-500/40 text-lg shadow-2xl transition-all">
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <template x-for="cat in categories">
                    <button @click="activeCat = cat" :class="activeCat === cat ? 'bg-white text-black' : 'bg-white/5 text-gray-500 hover:text-white'" class="px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all" x-text="cat"></button>
                </template>
            </div>
        </header>

        <main class="max-w-[1440px] mx-auto px-10 pb-40 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <template x-for="tool in filteredTools()">
                <div @click="handleToolAction(tool)" class="glass tool-card p-10 flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[9px] font-black uppercase tracking-widest text-blue-500" x-text="tool.cat"></span>
                            <div x-show="compareOpen" class="w-6 h-6 rounded-full border border-white/10 flex items-center justify-center" :class="compareList.includes(tool.name) ? 'bg-blue-600' : ''"></div>
                        </div>
                        <h2 class="text-3xl font-extrabold mb-4 group-hover:text-blue-400 transition-all leading-tight" x-text="tool.name"></h2>
                        <p class="text-gray-500 text-xs leading-relaxed" x-text="tool.desc"></p>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <div x-show="compareList.length === 2" x-cloak class="fixed inset-0 z-[150] flex items-center justify-center bg-black/98 p-6">
        <div class="glass max-w-5xl w-full p-16 rounded-[80px] relative">
            <button @click="resetCompare()" class="absolute top-12 right-12 text-gray-500 hover:text-white">✕</button>
            <div class="grid grid-cols-2 gap-16">
                <template x-for="name in compareList">
                    <div class="text-center p-10 glass rounded-[60px] border-white/5">
                        <h3 class="text-5xl font-black mb-6 text-gradient" x-text="name"></h3>
                        <p class="text-gray-400 leading-relaxed mb-10 text-sm" x-text="getToolByName(name).desc"></p>
                        <button @click="launchToolByName(name)" class="w-full bg-white text-black py-5 rounded-3xl font-black uppercase text-[10px]">Launch Node</button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[300] flex items-center justify-center bg-black">
        <div class="glass p-20 rounded-[80px] w-full max-w-lg text-center border-white/5 shadow-2xl">
            <h1 class="text-7xl font-black mb-12 tracking-tighter text-gradient uppercase">Neuron</h1>
            <input type="text" x-model="user" placeholder="Enter Identifier" @keyup.enter="login()" class="w-full bg-white/5 border border-white/10 rounded-3xl px-8 py-6 mb-8 text-center text-2xl outline-none focus:border-blue-500 transition-all font-light">
            <button @click="login()" class="w-full bg-white text-black font-black py-6 rounded-3xl uppercase tracking-widest text-[11px]">Initialize Node</button>
        </div>
    </div>

    <script>
        function neuronSystem() {
            return {
                isLoggedIn: false, user: '', query: '', activeCat: 'All', view: 'hub',
                padOpen: false, scratchpad: '', sidebarTab: 'draft', copyStatus: false,
                recommendations: [], stats: { launches: 0 }, compareOpen: false, compareList: [],
                chatInput: '', chatHistory: [],
                categories: ['All', 'Chat', 'Design', 'Coding', 'Research', 'Video', 'Audio', 'Office'],
                recipes: [
                    { title: 'The LinkedIn Viralizer', text: 'Act as a Senior Copywriter. Rewrite this as a viral LinkedIn post: [NOTES]' },
                    { title: 'Technical Architect', text: 'Design a modular scalable structure for: [OBJECTIVE]' },
                    { title: 'The Fact Checker', text: 'Analyze this claim and find evidence-based research: [CLAIM]' }
                ],
                tools: [
                    // --- 100+ TOOLS DATA START ---
                    { name: 'ChatGPT-5', cat: 'Chat', desc: 'SOTA reasoning and autonomous task execution.', link: 'https://chat.openai.com', price: 'Paid' },
                    { name: 'Claude 4', cat: 'Chat', desc: 'Superior technical writing and human-level coding.', link: 'https://claude.ai', price: 'Paid' },
                    { name: 'Gemini 2.0', cat: 'Chat', desc: 'Google AI with 2M context and Workspace sync.', link: 'https://gemini.google.com', price: 'Free' },
                    { name: 'Cursor Pro', cat: 'Coding', desc: 'AI-native IDE that writes whole features.', link: 'https://cursor.com', price: 'Freemium' },
                    { name: 'Bolt.new', cat: 'Coding', desc: 'Instant full-stack dev and deploy in browser.', link: 'https://bolt.new', price: 'Free' },
                    { name: 'V0.dev', cat: 'Coding', desc: 'Generative UI for React and Tailwind.', link: 'https://v0.dev', price: 'Free' },
                    { name: 'Midjourney V8', cat: 'Design', desc: 'Professional image generation.', link: 'https://midjourney.com', price: 'Paid' },
                    { name: 'Ideogram 2', cat: 'Design', desc: 'Best AI for logo and typography design.', link: 'https://ideogram.ai', price: 'Free' },
                    { name: 'Gamma', cat: 'Office', desc: 'Create presentation decks via chat.', link: 'https://gamma.app', price: 'Free' },
                    { name: 'ElevenLabs', cat: 'Audio', desc: 'SOTA voice synthesis and cloning.', link: 'https://elevenlabs.io', price: 'Free' },
                    { name: 'Suno V4', cat: 'Audio', desc: 'Full-quality song generation with lyrics.', link: 'https://suno.com', price: 'Free' },
                    { name: 'Luma Dream', cat: 'Video', desc: 'SOTA hyper-realistic video generation.', link: 'https://lumalabs.ai', price: 'Free' },
                    { name: 'Perplexity', cat: 'Research', desc: 'Conversational search with live sources.', link: 'https://perplexity.ai', price: 'Free' }
                    // ... More tools can be added here
                ],
                init() {
                    const sUser = localStorage.getItem('nr_user'), sStats = localStorage.getItem('nr_stats');
                    if (sUser) { this.user = sUser; this.isLoggedIn = true; }
                    if (sStats) this.stats = JSON.parse(sStats);
                },
                login() { if (this.user.trim()) { localStorage.setItem('nr_user', this.user); this.isLoggedIn = true; } },
                sendChat() {
                    if (!this.chatInput.trim()) return;
                    this.chatHistory.push({ role: 'user', content: this.chatInput });
                    const lowInput = this.chatInput.toLowerCase();
                    let response = "Exploring the nodes for your goal... Try searching the 'Coding' or 'Design' category.";
                    if (lowInput.includes("who made")) response = "NEURON was built by Meghna as the definitive AI Command Center.";
                    if (lowInput.includes("coding")) response = "For high-end coding, I recommend Cursor Pro or Claude 4.";
                    setTimeout(() => { this.chatHistory.push({ role: 'assistant', content: response }); this.chatInput = ''; }, 600);
                },
                applyRecipe(r) { this.scratchpad = r.text; this.sidebarTab = 'draft'; this.updateRecs(); },
                handleToolAction(t) {
                    if (this.compareOpen) {
                        if (this.compareList.includes(t.name)) this.compareList = this.compareList.filter(x => x !== t.name);
                        else if (this.compareList.length < 2) this.compareList.push(t.name);
                    } else { this.launchTool(t); }
                },
                launchTool(t) { this.stats.launches++; localStorage.setItem('nr_stats', JSON.stringify(this.stats)); window.open(t.link, '_blank'); },
                launchToolByName(name) { const t = this.tools.find(x => x.name === name); if (t) this.launchTool(t); },
                getToolByName(name) { return this.tools.find(x => x.name === name); },
                toggleCompare() { this.compareOpen = !this.compareOpen; this.compareList = []; },
                resetCompare() { this.compareList = []; this.compareOpen = false; },
                updateRecs() {
                    const low = this.scratchpad.toLowerCase();
                    this.recommendations = [];
                    if (low.includes('code')) this.recommendations.push('Cursor Pro', 'Bolt.new');
                    if (low.includes('ppt')) this.recommendations.push('Gamma');
                    if (low.includes('song')) this.recommendations.push('Suno V4');
                },
                refinePrompt() { this.scratchpad = `[NEURON_REFINED]\n\nOBJECTIVE: ${this.scratchpad}\n\nDeliver expert structured results.`; },
                copyPrompt() { navigator.clipboard.writeText(this.scratchpad); this.copyStatus = true; setTimeout(() => this.copyStatus = false, 2000); },
                filteredTools() {
                    return this.tools.filter(t => {
                        const q = this.query.toLowerCase();
                        return (t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q)) && (this.activeCat === 'All' || t.cat === this.activeCat);
                    });
                }
            }
        }
    </script>
</body>
</html>
