<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURON | Global AI Index</title>
    <link rel="icon" href="https://fav.farm/🧠">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020205; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .bg-custom {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(2, 2, 5, 0.92), rgba(2, 2, 5, 0.92)), 
                              url('https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; z-index: -10; animation: slowZoom 60s infinite alternate;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gradient { background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        [x-cloak] { display: none !important; }
        .tool-card { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
        .tool-card:hover { transform: scale(1.05) translateY(-10px); z-index: 50; border-color: rgba(96, 165, 250, 0.4); box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
        .pulse { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 0 0px rgba(74, 222, 128, 0.4); } 100% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; animation: marquee 50s linear infinite; }
    </style>
</head>
<body x-data="neuronSystem()" x-init="init()">
    <div class="bg-custom"></div>

    <div class="w-full glass border-b border-white/5 py-2 overflow-hidden z-[60] sticky top-0">
        <div class="animate-marquee whitespace-nowrap">
            <template x-for="i in 5">
                <span class="mx-10 text-[9px] uppercase tracking-[0.4em] text-gray-500 font-bold">
                    Registry Active: 45 Tools // Latency: 14ms // Current Node: <span class="text-white" x-text="user"></span> // 
                </span>
            </template>
        </div>
    </div>

    <div x-show="view === 'profile'" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center bg-black/98 backdrop-blur-3xl p-6">
        <div class="glass max-w-2xl w-full p-12 rounded-[60px] border-white/10 text-center relative">
            <button @click="view = 'hub'" class="absolute top-10 right-10 text-gray-500 hover:text-white">✕</button>
            <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-3xl font-black" x-text="user[0]"></div>
            <h2 class="text-4xl font-black mb-10 text-gradient uppercase tracking-tighter" x-text="user"></h2>
            <div class="grid grid-cols-2 gap-4 mb-10 text-left">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Total Favorites</p>
                    <p class="text-2xl font-black" x-text="favs.length"></p>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Tools Used</p>
                    <p class="text-2xl font-black" x-text="history.length"></p>
                </div>
            </div>
            <div class="text-left mb-10">
                <h4 class="text-[10px] uppercase tracking-widest text-gray-500 mb-4 px-2">Launch History</h4>
                <div class="space-y-2 max-h-40 overflow-y-auto pr-2">
                    <template x-for="item in history.slice().reverse()">
                        <div class="glass px-4 py-3 rounded-xl flex justify-between items-center border-white/5 text-xs">
                            <span class="font-bold" x-text="item.name"></span>
                            <span class="text-gray-600" x-text="item.time"></span>
                        </div>
                    </template>
                </div>
            </div>
            <button @click="view = 'hub'" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest">Return to Command</button>
        </div>
    </div>

    <div x-show="selectedTool" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-2xl p-6">
        <template x-if="selectedTool">
            <div class="glass max-w-xl w-full p-12 rounded-[60px] border-blue-500/20 relative">
                <button @click="selectedTool = null" class="absolute top-10 right-10 text-gray-500 hover:text-white">✕</button>
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-4 block" x-text="selectedTool.cat"></span>
                <h2 class="text-5xl font-black mb-6 tracking-tighter text-gradient" x-text="selectedTool.name"></h2>
                <p class="text-gray-300 leading-relaxed text-lg mb-10" x-text="selectedTool.longDesc"></p>
                <button @click="launchTool(selectedTool)" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3">
                    Initialize & Launch Tool
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                </button>
            </div>
        </template>
    </div>

    <div :class="padOpen ? 'translate-x-0' : 'translate-x-[85%]'" class="fixed right-0 top-1/4 z-50 w-80 glass rounded-l-[50px] p-8 border-blue-500/20 shadow-2xl transition-transform duration-500">
        <button @click="padOpen = !padOpen" class="absolute -left-12 top-10 bg-blue-600 w-12 h-12 rounded-l-2xl flex items-center justify-center">
            <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
        </button>
        <h4 class="text-[10px] font-black uppercase tracking-widest text-blue-400 mb-6">Prompt Architect</h4>
        <textarea x-model="scratchpad" placeholder="Draft your goal..." class="w-full h-48 bg-white/5 border border-white/10 rounded-3xl p-5 text-sm focus:outline-none focus:border-blue-500 transition-all mb-4"></textarea>
        <button @click="refinePrompt()" class="w-full bg-white text-black py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Refine with AI Logic</button>
    </div>

    <div x-show="view === 'hub'" x-cloak class="min-h-screen">
        <nav class="max-w-7xl mx-auto p-10 flex justify-between items-center">
            <div class="text-3xl font-black tracking-tighter flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600"></div>
                NEURON
            </div>
            <button @click="view = 'profile'" class="glass px-6 py-2 rounded-full border-white/10 flex items-center gap-3 hover:border-blue-500 transition-all text-[10px] font-black uppercase tracking-widest" x-text="user"></button>
        </nav>

        <header class="max-w-4xl mx-auto text-center py-10 px-6">
            <h1 class="text-7xl md:text-9xl font-black mb-12 tracking-tight uppercase">Core</h1>
            <div class="relative max-w-2xl mx-auto mb-16">
                <input type="text" x-model="query" placeholder="I want to code... make a ppt... generate a song..." 
                       class="w-full bg-white/5 border border-white/5 rounded-full px-10 py-7 focus:outline-none focus:border-blue-500/40 text-xl shadow-2xl transition-all">
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <template x-for="cat in ['All', 'Favorites', 'Chat', 'Design', 'Coding', 'Research', 'Video', 'Audio', 'Writing']">
                    <button @click="activeCat = cat" :class="activeCat === cat ? 'bg-white text-black scale-110' : 'bg-white/5 text-gray-500 hover:text-white'" class="px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all" x-text="cat"></button>
                </template>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-10 pb-40 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <template x-for="tool in filteredTools()">
                <div @click="selectedTool = tool" class="glass tool-card rounded-[60px] p-10 flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center gap-2">
                                <div class="pulse"></div>
                                <span class="text-[9px] font-black uppercase tracking-widest text-blue-500" x-text="tool.cat"></span>
                            </div>
                            <button @click.stop="toggleFav(tool.name)" :class="favs.includes(tool.name) ? 'text-yellow-400' : 'text-gray-800 hover:text-white'">
                                <svg class="h-6 w-6" :fill="favs.includes(tool.name) ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                            </button>
                        </div>
                        <h2 class="text-4xl font-extrabold mb-4 group-hover:text-blue-400 transition-colors" x-text="tool.name"></h2>
                        <p class="text-gray-500 text-sm leading-relaxed" x-text="tool.desc"></p>
                    </div>
                    <div class="pt-10 flex items-center justify-between border-t border-white/5 mt-8">
                        <span class="text-[9px] font-black uppercase text-gray-700 tracking-[0.2em]">Deep Dive →</span>
                        <div class="text-[10px] text-gray-600 font-bold" x-text="tool.price"></div>
                    </div>
                </div>
            </template>
        </main>

        <div class="fixed bottom-10 right-10 z-40 flex flex-col items-center opacity-50 hover:opacity-100 transition-opacity cursor-pointer" @click="window.scrollBy({top: 600, behavior: 'smooth'})">
            <span class="text-[9px] font-black uppercase tracking-widest" style="writing-mode: vertical-rl;">Explore Registry</span>
            <svg class="h-4 w-4 mt-2 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
        </div>
    </div>

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center">
        <div class="bg-custom"></div>
        <div class="glass p-16 rounded-[60px] w-full max-w-md text-center border-white/5">
            <h2 class="text-6xl font-black mb-10 tracking-tighter text-gradient">NEURON</h2>
            <input type="text" x-model="user" placeholder="Identifier" @keyup.enter="login()" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 mb-6 text-center text-xl outline-none focus:border-blue-500 transition-all">
            <button @click="login()" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase tracking-widest text-[10px]">Initialize Node</button>
        </div>
    </div>

    <script>
        function neuronSystem() {
            return {
                isLoggedIn: false, user: '', query: '', activeCat: 'All', favs: [], history: [], view: 'hub', selectedTool: null, padOpen: false, scratchpad: '',
                tools: [
                    // CHAT & ASSISTANTS
                    { name: 'ChatGPT-5', cat: 'Chat', desc: 'The defining conversational agent for reasoning and creativity.', longDesc: 'OpenAI\'s 2026 flagship model. Optimized for complex reasoning, multi-turn dialogue, and autonomous task execution.', link: 'https://chat.openai.com', price: '$20/mo', tags: ['gpt', 'talk', 'write', 'code'] },
                    { name: 'Claude 4', cat: 'Chat', desc: 'Unrivaled coding assistance and human-like analysis.', longDesc: 'Anthropic\'s most advanced model. Known for near-perfect technical writing, code generation, and massive context window.', link: 'https://claude.ai', price: '$20/mo', tags: ['code', 'write', 'anthropic'] },
                    { name: 'Gemini 2.0', cat: 'Chat', desc: 'Google multimodal AI with massive context and workspace sync.', link: 'https://gemini.google.com', price: '$19.99/mo', tags: ['google', 'search', 'docs'] },
                    { name: 'Perplexity', cat: 'Research', desc: 'The conversational answer engine with verified links.', longDesc: 'Replacing search engines with direct answers. Perplexity synthesizes live web data into clean citations and verified research summaries.', link: 'https://perplexity.ai', price: 'Freemium', tags: ['search', 'verify', 'research'] },
                    
                    // DESIGN & PRESENTATION
                    { name: 'Gamma', cat: 'Design', desc: 'Generate cinematic presentations and websites instantly.', longDesc: 'A new medium for presenting ideas. Powered by AI, Gamma creates beautiful, interactive slide decks and webpages from a simple prompt.', link: 'https://gamma.app', price: '$16/mo', tags: ['ppt', 'slides', 'design', 'presentation'] },
                    { name: 'Midjourney V8', cat: 'Design', desc: 'Professional artistic image generation with extreme detail.', link: 'https://midjourney.com', price: '$10/mo', tags: ['image', 'art', 'draw', 'paint'] },
                    { name: 'Ideogram 2', cat: 'Design', desc: 'Best AI for generating typography and clean logo graphics.', link: 'https://ideogram.ai', price: 'Freemium', tags: ['logo', 'text', 'graphic'] },
                    { name: 'Canva Magic', cat: 'Design', desc: 'Integrated AI design tools within the Canva ecosystem.', link: 'https://canva.com', price: 'Freemium', tags: ['design', 'post', 'social'] },

                    // CODING & DEV
                    { name: 'Cursor Pro', cat: 'Coding', desc: 'The AI-native code editor that builds whole features.', longDesc: 'A fork of VS Code with AI baked into the core. It understands your entire codebase and automates debugging and feature builds.', link: 'https://cursor.com', price: 'Freemium', tags: ['code', 'dev', 'programming'] },
                    { name: 'Lovable', cat: 'Coding', desc: 'Turn natural language into full-stack web applications.', link: 'https://lovable.dev', price: 'Paid', tags: ['code', 'app', 'build', 'dev'] },
                    { name: 'Bolt.new', cat: 'Coding', desc: 'Full-stack AI developer in your browser. Build instantly.', link: 'https://bolt.new', price: 'Free', tags: ['code', 'dev', 'website'] },
                    { name: 'V0.dev', cat: 'Coding', desc: 'Generative UI system for React and Tailwind components.', link: 'https://v0.dev', price: 'Freemium', tags: ['ui', 'code', 'frontend'] },

                    // VIDEO & AUDIO
                    { name: 'Sora 2', cat: 'Video', desc: 'Photorealistic AI video generation with native audio.', link: 'https://openai.com/sora', price: 'Paid', tags: ['video', 'movie', 'create'] },
                    { name: 'Luma Dream', cat: 'Video', desc: 'High-speed hyper-realistic video generation from text.', link: 'https://lumalabs.ai', price: 'Freemium', tags: ['video', 'animate', '3d'] },
                    { name: 'Runway Gen-4', cat: 'Video', desc: 'Professional standard for AI filmmaking and VFX.', link: 'https://runwayml.com', price: '$15/mo', tags: ['video', 'movie', 'vfx'] },
                    { name: 'ElevenLabs', cat: 'Audio', desc: 'Hyper-realistic AI voice synthesis and live translation.', link: 'https://elevenlabs.io', price: 'Freemium', tags: ['voice', 'audio', 'talk'] },
                    { name: 'Suno V4', cat: 'Audio', desc: 'Generate studio-quality songs with vocals and lyrics.', link: 'https://suno.com', price: 'Freemium', tags: ['music', 'song', 'audio'] },

                    // RESEARCH & WRITING
                    { name: 'Jasper AI', cat: 'Writing', desc: 'Enterprise marketing copy and brand voice generation.', link: 'https://jasper.ai', price: 'Paid', tags: ['write', 'copy', 'marketing'] },
                    { name: 'Consensus', cat: 'Research', desc: 'Find evidence-based answers in peer-reviewed journals.', link: 'https://consensus.app', price: 'Free', tags: ['science', 'research', 'paper'] },
                    { name: 'ResearchRabbit', cat: 'Research', desc: 'The Spotify for research papers. Discover related studies.', link: 'https://researchrabbit.ai', price: 'Free', tags: ['research', 'paper', 'map'] },
                    { name: 'Notion AI', cat: 'Writing', desc: 'Integrated AI for drafting notes and managing projects.', link: 'https://notion.so', price: 'Freemium', tags: ['write', 'notes', 'plan'] },
                    { name: 'Superhuman', cat: 'Writing', desc: 'The fastest email experience powered by generative AI.', link: 'https://superhuman.com', price: '$30/mo', tags: ['email', 'write', 'organize'] }
                ],
                init() {
                    const sUser = localStorage.getItem('nr_user'), sFavs = localStorage.getItem('nr_favs'), sHist = localStorage.getItem('nr_hist');
                    if (sUser) { this.user = sUser; this.isLoggedIn = true; }
                    if (sFavs) this.favs = JSON.parse(sFavs);
                    if (sHist) this.history = JSON.parse(sHist);
                },
                login() { if (this.user.trim()) { localStorage.setItem('nr_user', this.user); this.isLoggedIn = true; } },
                toggleFav(name) { this.favs = this.favs.includes(name) ? this.favs.filter(f => f !== name) : [...this.favs, name]; localStorage.setItem('nr_favs', JSON.stringify(this.favs)); },
                launchTool(t) { this.history.push({name: t.name, time: new Date().toLocaleTimeString()}); localStorage.setItem('nr_hist', JSON.stringify(this.history)); window.open(t.link, '_blank'); },
                refinePrompt() { if (this.scratchpad.length > 5) this.scratchpad += "\n\n[NEURON ARCHITECT]: Adopt an expert persona. Be direct. Formulate 3 variations."; },
                filteredTools() {
                    return this.tools.filter(t => {
                        const q = this.query.toLowerCase();
                        const mSearch = t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tag => q.includes(tag));
                        const mCat = this.activeCat === 'All' || (this.activeCat === 'Favorites' && this.favs.includes(t.name)) || t.cat === this.activeCat;
                        return mSearch && mCat;
                    });
                }
            }
        }
    </script>
</body>
</html>
